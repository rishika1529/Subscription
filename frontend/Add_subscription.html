<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Subscription - SubsVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-animation">
        <div class="grid-overlay"></div>
        <div class="gradient-orb"></div>
        <div class="gradient-orb"></div>
        <div class="stars" id="stars"></div>
        <div class="shapes" id="shapes"></div>
        <div id="meteors"></div>
    </div>

    <div class="container">
        <div class="auth-card" style="max-width: 600px;">
            <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
            
            <div class="logo">
                <h1 style="font-size: 32px;">Add Subscription</h1>
                <p>Track your new subscription</p>
            </div>

            <form action="dashboard.html">
                <div class="form-group">
                    <label for="serviceName">Service Name</label>
                    <input type="text" id="serviceName" placeholder="e.g., Netflix, Spotify" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="music">Music</option>
                        <option value="storage">Cloud Storage</option>
                        <option value="productivity">Productivity</option>
                        <option value="fitness">Fitness</option>
                        <option value="gaming">Gaming</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="plan">Plan Type</label>
                    <input type="text" id="plan" placeholder="e.g., Premium, Individual" required>
                </div>

                <div class="form-group">
                    <label for="cost">Cost ($)</label>
                    <input type="number" id="cost" placeholder="9.99" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="billingCycle">Billing Cycle</label>
                    <select id="billingCycle" required>
                        <option value="">Select Billing Cycle</option>
                        <option value="monthly">Monthly</option>
                        <option value="yearly">Yearly</option>
                        <option value="quarterly">Quarterly</option>
                        <option value="weekly">Weekly</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="renewalDate">Next Renewal Date</label>
                    <input type="date" id="renewalDate" required>
                </div>

                <div class="form-group">
                    <label for="notes">Notes (Optional)</label>
                    <textarea id="notes" placeholder="Add any additional notes about this subscription"></textarea>
                </div>

                <button type="submit" class="btn">Add Subscription</button>
                <a href="dashboard.html" class="btn btn-secondary" style="margin-top: 10px;">Cancel</a>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
