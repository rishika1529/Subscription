<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SubsVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-animation">
        <div class="grid-overlay"></div>
        <div class="gradient-orb"></div>
        <div class="gradient-orb"></div>
        <div class="stars" id="stars"></div>
        <div class="shapes" id="shapes"></div>
        <div id="meteors"></div>
    </div>

    <div class="container">
        <div class="auth-card">
            <div class="logo">
                <h1>SubsVault</h1>
                <p>Premium Subscription Manager</p>
            </div>

            <form action="dashboard.html">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="your.email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn">Sign In</button>

                <div class="auth-link">
                    Don't have an account? <a href="signup.html">Create Account</a>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
