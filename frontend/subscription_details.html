<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Details - SubsVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-animation">
        <div class="grid-overlay"></div>
        <div class="gradient-orb"></div>
        <div class="gradient-orb"></div>
        <div class="stars" id="stars"></div>
        <div class="shapes" id="shapes"></div>
        <div id="meteors"></div>
    </div>

    <div class="container">
        <div class="auth-card" style="max-width: 600px;">
            <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
            
            <div style="text-align: center; margin-bottom: 30px;">
                <div class="subscription-logo" style="margin: 0 auto 20px;">N</div>
                <h1 style="font-family: 'Orbitron', sans-serif; font-size: 32px; margin-bottom: 10px;">Netflix</h1>
                <p style="color: var(--text-gray); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Entertainment</p>
            </div>

            <form action="dashboard.html">
                <div class="form-group">
                    <label for="serviceName">Service Name</label>
                    <input type="text" id="serviceName" value="Netflix" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="entertainment" selected>Entertainment</option>
                        <option value="music">Music</option>
                        <option value="storage">Cloud Storage</option>
                        <option value="productivity">Productivity</option>
                        <option value="fitness">Fitness</option>
                        <option value="gaming">Gaming</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="plan">Plan Type</label>
                    <input type="text" id="plan" value="Premium" required>
                </div>

                <div class="form-group">
                    <label for="cost">Cost ($)</label>
                    <input type="number" id="cost" value="19.99" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="billingCycle">Billing Cycle</label>
                    <select id="billingCycle" required>
                        <option value="">Select Billing Cycle</option>
                        <option value="monthly" selected>Monthly</option>
                        <option value="yearly">Yearly</option>
                        <option value="quarterly">Quarterly</option>
                        <option value="weekly">Weekly</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="renewalDate">Next Renewal Date</label>
                    <input type="date" id="renewalDate" value="2024-12-15" required>
                </div>

                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" required>
                        <option value="active" selected>Active</option>
                        <option value="inactive">Inactive</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" placeholder="Add any additional notes about this subscription">Sharing with family members</textarea>
                </div>

                <button type="submit" class="btn">Save Changes</button>
                <button type="button" class="btn btn-secondary" style="margin-top: 10px;" onclick="if(confirm('Are you sure you want to delete this subscription?')) window.location.href='dashboard.html'">Delete Subscription</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
